<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Пример современного веб-сайта с мета-тегами и манифестом для PWA.">
    <meta name="keywords" content="HTML, CSS, PWA, манифест, мета-теги, веб-разработка">
    <meta name="author" content="Ваше Имя">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Мой современный сайт">
    <meta property="og:description" content="Пример страницы с мета-тегами и манифестом для публикации.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#4A90D9">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <title>Мой современный сайт</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
            opacity: 0.95;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin: 30px 0;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        
        .feature span {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .btn {
            display: inline-block;
            background: #fff;
            color: #4A90D9;
            padding: 14px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 8px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 24px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .features {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="logo">🚀</div>
        <h1>Готов к публикации</h1>
        <p>
            Эта страница содержит все необходимые мета-теги, 
            манифест и оптимизирована для публикации в интернете.
        </p>
        
        <div class="features">
            <div class="feature">
                <span>📱</span>
                PWA Ready
            </div>
            <div class="feature">
                <span>🔍</span>
                SEO Optimized
            </div>
            <div class="feature">
                <span>⚡</span>
                Fast Loading
            </div>
            <div class="feature">
                <span>🎨</span>
                Modern Design
            </div>
        </div>
        
        <a href="#" class="btn">Начать работу</a>
        <div class="badge">✅ Все мета-теги и манифест добавлены</div>
    </main>
    
    <script>
        // Проверка поддержки Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch(err => console.log('Ошибка SW:', err));
        }
        
        // Логирование информации о манифесте
        fetch('manifest.json')
            .then(res => res.json())
            .then(data => console.log('Манифест загружен:', data))
            .catch(() => console.log('Манифест не найден'));
    </script>
</body>
</html>
